<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Permissions-Policy" content="geolocation=*">
    <title>🌍 Мой Глобус</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #000; }
        #map { width: 100vw; height: 100vh; z-index: 1; }
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 99999; color: #fff; }
        #loader.hidden { display: none; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.15); border-top-color: #4facfe; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-box { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 30px; width: 90%; max-width: 380px; text-align: center; }
        .login-box input { width: 100%; padding: 12px; border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; background: rgba(255,255,255,0.08); color: #fff; font-size: 1em; margin-bottom: 12px; }
        .login-btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 1em; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
        .btn-admin { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        .btn-visitor { background: rgba(255,255,255,0.1); color: #ccc; border: 1px solid rgba(255,255,255,0.2); }
        #loginError { color: #ff6b6b; margin-top: 8px; display: none; }

        #adminPanel { position: fixed; top: 15px; left: 15px; z-index: 1000; display: none; flex-direction: column; gap: 8px; }
        .panel-btn { padding: 10px 16px; border: none; border-radius: 10px; font-size: 0.9em; font-weight: 600; cursor: pointer; backdrop-filter: blur(10px); display: flex; align-items: center; gap: 6px; }
        .btn-track { background: rgba(46,213,115,0.9); color: #fff; }
        .btn-track.active { background: rgba(255,71,87,0.9); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
        .btn-add { background: rgba(100,200,255,0.9); color: #fff; }
        .btn-add.active { background: rgba(255,165,2,0.9); }
        .btn-del { background: rgba(255,71,87,0.9); color: #fff; }

        #photoPopup { position: fixed; z-index: 2000; display: none; background: rgba(20,20,40,0.95); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.15); border-radius: 14px; overflow: hidden; max-width: 340px; left: 50%; top: 50%; transform: translate(-50%, -50%); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        #photoPopup img { width: 100%; max-height: 280px; object-fit: cover; }
        #photoPopup .info { padding: 10px 14px; color: #fff; }
        #photoPopup .close { position: absolute; top: 6px; right: 6px; width: 28px; height: 28px; border-radius: 50%; background: rgba(0,0,0,0.6); color: #fff; border: none; cursor: pointer; }

        #addModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2500; display: none; align-items: center; justify-content: center; }
        .modal { background: linear-gradient(135deg, #1a1a2e, #16213e); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 25px; width: 90%; max-width: 400px; text-align: center; }
        .modal h3 { color: #fff; margin-bottom: 15px; }
        #preview { width: 100%; max-height: 220px; object-fit: cover; border-radius: 10px; margin-bottom: 12px; display: none; }
        .file-lbl { display: inline-block; padding: 10px 20px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border-radius: 10px; cursor: pointer; margin-bottom: 12px; }
        .file-lbl input { display: none; }
        .modal-btns { display: flex; gap: 8px; }
        .modal-btns button { flex: 1; padding: 10px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-save { background: #2ed573; color: #fff; }
        .btn-cancel { background: rgba(255,255,255,0.1); color: #ccc; }

        #geoStatus { position: fixed; bottom: 12px; left: 12px; z-index: 1000; padding: 6px 12px; border-radius: 8px; background: rgba(46,213,115,0.9); color: #fff; display: none; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 10px; color: #fff; z-index: 99999; animation: tIn 0.3s, tOut 0.3s 2.7s forwards; }
        .toast-s { background: rgba(46,213,115,0.9); }
        .toast-e { background: rgba(255,71,87,0.9); }
        .toast-i { background: rgba(100,200,255,0.9); }
        @keyframes tIn { from{opacity:0;transform:translateX(-50%) translateY(15px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
        @keyframes tOut { to{opacity:0} }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div><div>Загрузка карты...</div></div>
    <div id="loginOverlay">
        <div class="login-box">
            <h2 style="color:#fff;margin-bottom:8px;">🌍 Мой Глобус</h2>
            <input type="password" id="pwdInput" placeholder="Пароль">
            <button class="login-btn btn-admin" onclick="login(true)">🔐 Владелец</button>
            <button class="login-btn btn-visitor" onclick="login(false)">👁 Гость</button>
            <div id="loginError">Неверно!</div>
        </div>
    </div>

    <div id="map"></div>

    <div id="adminPanel">
        <button class="panel-btn btn-track" id="btnTrack" onclick="toggleTrack()">📍 Геолокация</button>
        <button class="panel-btn btn-add" id="btnAdd" onclick="toggleAdd()">📌 Точка</button>
        <button class="panel-btn btn-del" id="btnDel" onclick="toggleDel()">🗑 Удалить</button>
    </div>

    <div id="photoPopup">
        <button class="close" onclick="closePopup()">✕</button>
        <img id="popImg" src="" alt="">
        <div class="info"><div id="popTitle"></div><div id="popCoords" style="color:#888;font-size:0.85em;margin-top:4px;"></div></div>
    </div>

    <div id="addModal">
        <div class="modal">
            <h3>📌 Новая точка</h3>
            <img id="preview">
            <label class="file-lbl">📷 Фото<input type="file" id="fileIn" accept="image/*" onchange="previewFile(event)"></label>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeModal()">Отмена</button>
                <button class="btn-save" onclick="savePoint()">Сохранить</button>
            </div>
        </div>
    </div>

    <div id="geoStatus">📍 Активно</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const PASS = "myglobe123";
        let map, isAdmin=false, tracking=false, addMode=false, delMode=false;
        let trackMarker=null, watchId=null, markers={};
        let pending=null, photo=null;

        function login(admin) {
            if(admin && document.getElementById('pwdInput').value !== PASS) {
                const e=document.getElementById('loginError'); e.style.display='block'; setTimeout(()=>e.style.display='none',2000); return;
            }
            isAdmin=admin;
            document.getElementById('loginOverlay').style.display='none';
            initMap();
        }
        document.getElementById('pwdInput').addEventListener('keypress', e=>{ if(e.key==='Enter') login(true); });

        function initMap() {
            map = L.map('map').setView([20, 0], 2);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap',
                maxZoom: 19
            }).addTo(map);
            
            document.getElementById('loader').classList.add('hidden');
            if(isAdmin) document.getElementById('adminPanel').style.display='flex';
            
            map.on('click', onMapClick);
            loadPoints();
            toast('🌍 Карта готова!','s');
        }

        function onMapClick(e) {
            if(addMode && isAdmin) {
                pending = e.latlng;
                document.getElementById('addModal').style.display='flex';
                return;
            }
            
            map.eachLayer(layer => {
                if(layer._pointId) {
                    const dist = map.distance(e.latlng, layer.getLatLng());
                    if(dist < 20) {
                        if(delMode && isAdmin) {
                            deletePoint(layer._pointId);
                        } else {
                            showPopup(layer);
                        }
                    }
                }
            });
            closePopup();
        }

        function toggleTrack() {
            if(!isAdmin) return;
            if(tracking) stopTrack(); else startTrack();
        }
        function startTrack() {
            if(!navigator.geolocation) return toast('❌ GPS недоступен','e');
            tracking=true;
            document.getElementById('btnTrack').classList.add('active');
            document.getElementById('geoStatus').style.display='block';
            watchId = navigator.geolocation.watchPosition(p=>updateTrack(p.coords.latitude, p.coords.longitude), e=>toast('Ошибка GPS','e'), {enableHighAccuracy:true});
            toast('📍 Отслеживание включено','s');
        }
        function stopTrack() {
            tracking=false;
            if(watchId) navigator.geolocation.clearWatch(watchId);
            if(trackMarker) { map.removeLayer(trackMarker); trackMarker=null; }
            document.getElementById('btnTrack').classList.remove('active');
            document.getElementById('geoStatus').style.display='none';
        }
        function updateTrack(lat,lng) {
            if(trackMarker) trackMarker.setLatLng([lat,lng]);
            else {
                trackMarker = L.marker([lat,lng], {
                    icon: L.divIcon({html:'📍', className:'track-marker', iconSize:[30,30]})
                }).addTo(map).bindPopup('📍 Вы здесь').openPopup();
            }
            map.setView([lat,lng], 15);
        }

        function toggleAdd() {
            if(!isAdmin) return;
            addMode=!addMode; delMode=false;
            document.getElementById('btnAdd').classList.toggle('active');
            document.getElementById('btnAdd').textContent = addMode ? '📌 Кликните на карту' : '📌 Точка';
            if(addMode) toast('📌 Кликните на карту','i');
        }
        function toggleDel() {
            if(!isAdmin) return;
            delMode=!delMode; addMode=false;
            document.getElementById('btnAdd').classList.remove('active');
            document.getElementById('btnDel').classList.toggle('active');
            if(delMode) toast('🗑 Кликните на точку','i');
        }

        function closeModal() {
            document.getElementById('addModal').style.display='none';
            pending=null; photo=null;
            document.getElementById('preview').style.display='none';
            document.getElementById('fileIn').value='';
        }
        function previewFile(e) {
            const f=e.target.files[0]; if(!f) return;
            if(f.size>5*1024*1024) return toast('❌ Макс 5МБ','e');
            const r=new FileReader();
            r.onload=ev=>{ photo=ev.target.result; document.getElementById('preview').src=photo; document.getElementById('preview').style.display='block'; };
            r.readAsDataURL(f);
        }
        function savePoint() {
            if(!pending) return;
            const d={id:'p_'+Date.now(), lat:pending.lat, lng:pending.lng, photo:photo, ts:Date.now()};
            const pts=getPts(); pts.push(d); localStorage.setItem('globePts',JSON.stringify(pts));
            addMarker(d);
            closeModal(); toast('✅ Добавлено','s');
        }

        function getPts() { try{return JSON.parse(localStorage.getItem('globePts')||'[]');}catch{return[];} }
        function loadPoints() { getPts().forEach(p=>addMarker(p)); }
        function addMarker(d) {
            const icon = d.photo ? '🖼' : '📌';
            const m = L.marker([d.lat, d.lng]).addTo(map);
            m._pointId = d.id; m._data = d;
            m.bindPopup(`${icon} Точка`);
            markers[d.id] = m;
        }
        function deletePoint(id) {
            const pts=getPts().filter(p=>p.id!==id);
            localStorage.setItem('globePts',JSON.stringify(pts));
            if(markers[id]) { map.removeLayer(markers[id]); delete markers[id]; }
            closePopup(); toast('🗑 Удалено','s');
        }

        function showPopup(layer) {
            const d=layer._data;
            document.getElementById('popImg').src=d.photo||'';
            document.getElementById('popImg').style.display=d.photo?'block':'none';
            document.getElementById('popTitle').textContent='📌 '+new Date(d.ts).toLocaleString('ru-RU');
            document.getElementById('popCoords').textContent=d.lat.toFixed(5)+', '+d.lng.toFixed(5);
            document.getElementById('photoPopup').style.display='block';
        }
        function closePopup() { document.getElementById('photoPopup').style.display='none'; }

        function toast(msg,type='i') {
            const t=document.createElement('div'); t.className='toast toast-'+type; t.textContent=msg;
            document.body.appendChild(t); setTimeout(()=>t.remove(),3000);
        }
        document.addEventListener('click', e=>{ if(!document.getElementById('photoPopup').contains(e.target)) closePopup(); });
        document.addEventListener('keydown', e=>{ if(e.key==='Escape'){closePopup();closeModal();if(addMode)toggleAdd();if(delMode)toggleDel();} });
    </script>
</body>
</html>
