<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="Permissions-Policy" content="geolocation=*">
    <title>🌍 Мой Глобус</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #000; }
        #cesiumContainer { width: 100vw; height: 100vh; position: relative; }
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 99999; color: #fff; text-align: center; transition: opacity 0.4s; }
        #loader.hidden { opacity: 0; pointer-events: none; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.15); border-top-color: #4facfe; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loader-text { margin-bottom: 20px; font-size: 1.1em; }
        #loader-error { color: #ff6b6b; margin-bottom: 15px; max-width: 80%; line-height: 1.5; display: none; }
        #retry-btn { padding: 10px 25px; background: #4facfe; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; display: none; }
        #retry-btn:hover { background: #00f2fe; }

        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-box { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 30px; width: 90%; max-width: 380px; text-align: center; }
        .login-box input { width: 100%; padding: 12px; border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; background: rgba(255,255,255,0.08); color: #fff; font-size: 1em; outline: none; margin-bottom: 12px; }
        .login-btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 1em; font-weight: 600; cursor: pointer; margin-bottom: 8px; transition: 0.2s; }
        .btn-admin { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        .btn-visitor { background: rgba(255,255,255,0.1); color: #ccc; border: 1px solid rgba(255,255,255,0.2); }
        #loginError { color: #ff6b6b; margin-top: 8px; font-size: 0.9em; display: none; }

        #adminPanel { position: fixed; top: 15px; left: 15px; z-index: 9000; display: none; flex-direction: column; gap: 8px; }
        .panel-btn { padding: 10px 16px; border: none; border-radius: 10px; font-size: 0.9em; font-weight: 600; cursor: pointer; backdrop-filter: blur(10px); display: flex; align-items: center; gap: 6px; white-space: nowrap; }
        .btn-track { background: rgba(46,213,115,0.85); color: #fff; }
        .btn-track.active { background: rgba(255,71,87,0.85); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{box-shadow:0 2px 10px rgba(255,71,87,0.3)} 50%{box-shadow:0 2px 20px rgba(255,71,87,0.6)} }
        .btn-add { background: rgba(100,200,255,0.85); color: #fff; }
        .btn-add.active { background: rgba(255,165,2,0.85); }
        .btn-del { background: rgba(255,71,87,0.85); color: #fff; }
        .btn-del.active { background: #ff0000; }

        #showInstr { position: fixed; top: 15px; right: 15px; z-index: 8500; width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-size: 1.2em; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #instrBox { position: fixed; top: 55px; right: 15px; z-index: 8000; background: rgba(15,15,30,0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px 15px; color: #ccc; font-size: 0.85em; max-width: 240px; display: none; }
        #instrBox h4 { color: #fff; margin-bottom: 6px; }
        #instrBox li { margin-bottom: 4px; padding-left: 4px; list-style: none; }

        #photoPopup { position: fixed; z-index: 8000; display: none; background: rgba(20,20,40,0.95); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.15); border-radius: 14px; overflow: hidden; max-width: 340px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); left: 50%; top: 50%; transform: translate(-50%, -50%); }
        #photoPopup img { width: 100%; max-height: 280px; object-fit: cover; display: block; }
        #photoPopup .info { padding: 10px 14px; color: #fff; font-size: 0.9em; }
        #photoPopup .coords { color: #888; font-size: 0.8em; margin-top: 4px; }
        #photoPopup .close { position: absolute; top: 6px; right: 6px; width: 28px; height: 28px; border-radius: 50%; background: rgba(0,0,0,0.6); color: #fff; border: none; font-size: 1.1em; cursor: pointer; }

        #addModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 9500; display: none; align-items: center; justify-content: center; }
        .modal { background: linear-gradient(135deg, #1a1a2e, #16213e); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 25px; width: 90%; max-width: 400px; text-align: center; }
        .modal h3 { color: #fff; margin-bottom: 15px; }
        #preview { width: 100%; max-height: 220px; object-fit: cover; border-radius: 10px; margin-bottom: 12px; display: none; }
        .file-lbl { display: inline-block; padding: 10px 20px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border-radius: 10px; cursor: pointer; font-weight: 600; margin-bottom: 12px; }
        .file-lbl input { display: none; }
        .modal-btns { display: flex; gap: 8px; }
        .modal-btns button { flex: 1; padding: 10px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-save { background: #2ed573; color: #fff; }
        .btn-cancel { background: rgba(255,255,255,0.1); color: #ccc; border: 1px solid rgba(255,255,255,0.2); }

        #geoStatus { position: fixed; bottom: 12px; left: 12px; z-index: 8000; padding: 6px 12px; border-radius: 8px; font-size: 0.8em; background: rgba(46,213,115,0.8); color: #fff; display: none; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 10px; color: #fff; font-weight: 600; z-index: 99999; animation: tIn 0.3s ease, tOut 0.3s ease 2.7s forwards; backdrop-filter: blur(10px); }
        .toast-s { background: rgba(46,213,115,0.9); } .toast-e { background: rgba(255,71,87,0.9); } .toast-i { background: rgba(100,200,255,0.9); }
        @keyframes tIn { from{opacity:0;transform:translateX(-50%) translateY(15px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
        @keyframes tOut { to{opacity:0} }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <div id="loader-text">Инициализация...</div>
        <div id="loader-error"></div>
        <button id="retry-btn" onclick="location.reload()">🔄 Перезагрузить</button>
    </div>

    <div id="loginOverlay">
        <div class="login-box">
            <h2 style="color:#fff;margin-bottom:8px;">🌍 Мой Глобус</h2>
            <input type="password" id="pwdInput" placeholder="Пароль администратора">
            <button class="login-btn btn-admin" onclick="login(true)">🔐 Войти как владелец</button>
            <button class="login-btn btn-visitor" onclick="login(false)">👁 Смотреть карту</button>
            <div id="loginError">Неверный пароль!</div>
        </div>
    </div>

    <div id="cesiumContainer"></div>

    <div id="adminPanel">
        <button class="panel-btn btn-track" id="btnTrack" onclick="toggleTrack()">📍 Геолокация: ВЫКЛ</button>
        <button class="panel-btn btn-add" id="btnAdd" onclick="toggleAdd()">📌 Добавить точку</button>
        <button class="panel-btn btn-del" id="btnDel" onclick="toggleDel()">🗑 Режим удаления</button>
    </div>

    <button id="showInstr" onclick="document.getElementById('instrBox').style.display = document.getElementById('instrBox').style.display==='none'?'block':'none'">?</button>
    <div id="instrBox">
        <h4>📖 Управление</h4>
        <li>🖱 Крутить: зажать и тянуть</li>
        <li>🔍 Зум: колёсико / щипок</li>
        <li>📌 Точка: клик → фото → сохранить</li>
        <li>🖼 Фото: клик на точку</li>
        <li>🗑 Удалить: включить режим → клик</li>
    </div>

    <div id="photoPopup">
        <button class="close" onclick="closePopup()">✕</button>
        <img id="popImg" src="" alt="Фото">
        <div class="info"><div id="popTitle"></div><div class="coords" id="popCoords"></div></div>
    </div>

    <div id="addModal">
        <div class="modal">
            <h3>📌 Новая точка</h3>
            <img id="preview">
            <label class="file-lbl">📷 Выбрать фото<input type="file" id="fileIn" accept="image/*" onchange="previewFile(event)"></label>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeModal()">Отмена</button>
                <button class="btn-save" onclick="savePoint()">💾 Сохранить</button>
            </div>
        </div>
    </div>

    <div id="geoStatus">📍 Отслеживание активно</div>

    <script>
        const PASS = "myglobe123"; // <-- ВАШ ПАРОЛЬ
        let viewer, isAdmin=false, tracking=false, addMode=false, delMode=false;
        let watchId, trackEnt, savedEnts=[];
        let pending=null, photo=null;

        function login(admin) {
            if(admin && document.getElementById('pwdInput').value !== PASS) {
                const e=document.getElementById('loginError'); e.style.display='block'; setTimeout(()=>e.style.display='none',2000); return;
            }
            isAdmin=admin;
            document.getElementById('loginOverlay').style.display='none';
            initCesium();
        }
        document.getElementById('pwdInput').addEventListener('keypress', e=>{ if(e.key==='Enter') login(true); });

        function showError(msg) {
            document.getElementById('loader-text').textContent = '❌ Ошибка загрузки';
            const errEl = document.getElementById('loader-error');
            errEl.textContent = msg;
            errEl.style.display = 'block';
            document.getElementById('retry-btn').style.display = 'inline-block';
        }
        function hideLoader() { document.getElementById('loader').classList.add('hidden'); }

        // 🔌 УМНЫЙ ЗАГРУЗЧИК С ЗЕРКАЛАМИ (РАБОТАЕТ В РФ)
        const cdnList = [
            { base: 'https://cdnjs.cloudflare.com/ajax/libs/cesium/1.119.0/', css: 'Cesium.css', js: 'Cesium.js' },
            { base: 'https://cdn.jsdelivr.net/npm/cesium@1.119.0/Build/Cesium/', css: 'widgets.css', js: 'Cesium.js' },
            { base: 'https://unpkg.com/cesium@1.119.0/Build/Cesium/', css: 'widgets.css', js: 'Cesium.js' }
        ];
        let cdnIdx = 0;

        function tryLoadCesium() {
            if(cdnIdx >= cdnList.length) {
                showError('⚠️ Все серверы карт недоступны. Попробуйте отключить AdBlock/VPN, обновить страницу или проверить интернет.');
                return;
            }
            const src = cdnList[cdnIdx];
            document.getElementById('loader-text').textContent = `Подключение к серверу ${cdnIdx+1}/3...`;
            
            // Загружаем CSS
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = src.base + src.css;
            link.onload = () => loadCesiumJS(src);
            link.onerror = () => { cdnIdx++; tryLoadCesium(); };
            document.head.appendChild(link);
        }

        function loadCesiumJS(src) {
            const script = document.createElement('script');
            script.src = src.base + src.js;
            script.onload = () => {
                window.Cesium = window.Cesium || window.CesiumJS;
                initCesium();
            };
            script.onerror = () => { cdnIdx++; tryLoadCesium(); };
            document.head.appendChild(script);
        }

        setTimeout(tryLoadCesium, 300);

        function initCesium() {
            try {
                if(typeof Cesium === 'undefined') throw new Error('Библиотека не загрузилась');
                
                const c = document.createElement('canvas');
                if(!c.getContext('webgl') && !c.getContext('experimental-webgl')) { showError("Ваш браузер не поддерживает WebGL."); return; }

                Cesium.Ion.defaultAccessToken = '';
                viewer = new Cesium.Viewer('cesiumContainer', {
                    baseLayerPicker: false, geocoder: false, homeButton: false,
                    sceneModePicker: false, navigationHelpButton: false,
                    animation: false, timeline: false, fullscreenButton: false,
                    selectionIndicator: false, infoBox: false, shouldAnimate: true
                });
                
                const layers = viewer.imageryLayers;
                if(layers.length > 0) layers.remove(layers.get(0));
                layers.addImageryProvider(new Cesium.UrlTemplateImageryProvider({
                    url: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png', maximumLevel: 19
                }));
                viewer._cesiumWidget._creditContainer.style.display = 'none';
                viewer.scene.globe.enableLighting = true;

                if(isAdmin) document.getElementById('adminPanel').style.display = 'flex';
                setupClick();
                loadPoints();
                hideLoader();
                toast('🌍 Карта готова!','s');
            } catch(err) {
                console.error(err);
                showError("Ошибка инициализации: " + err.message);
            }
        }

        function setupClick() {
            const h = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
            h.setInputAction(mv => {
                const ray = viewer.camera.getPickRay(mv.position);
                const pos = viewer.scene.globe.pick(ray, viewer.scene);
                if(!pos) { closePopup(); return; }
                const ll = Cesium.Cartographic.fromCartesian(pos);
                const lat = Cesium.Math.toDegrees(ll.latitude), lng = Cesium.Math.toDegrees(ll.longitude);
                const pick = viewer.scene.pick(mv.position);

                if(pick && pick.id && pick.id._type==='pt') {
                    if(delMode && isAdmin) delPoint(pick.id._id); else showPopup(pick.id);
                    return;
                }
                if(addMode && isAdmin) { pending={lat,lng}; document.getElementById('addModal').style.display='flex'; return; }
                closePopup();
            }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
        }

        function toggleTrack() {
            if(!isAdmin) return;
            if(tracking) stopTrack(); else startTrack();
        }
        function startTrack() {
            if(!navigator.geolocation) return toast('❌ Геолокация не доступна','e');
            tracking=true; trackUI('📍 Геолокация: ВКЛ','active','geoStatus','block');
            watchId = navigator.geolocation.watchPosition(p=>updateTrack(p.coords.latitude, p.coords.longitude), e=>toast('❌ Ошибка GPS','e'), {enableHighAccuracy:true, maximumAge:3000});
            toast('📍 Отслеживание запущено','s');
        }
        function stopTrack() {
            tracking=false; if(watchId) navigator.geolocation.clearWatch(watchId);
            if(trackEnt) viewer.entities.remove(trackEnt); trackEnt=null;
            trackUI('📍 Геолокация: ВЫКЛ','','geoStatus','none'); toast('📍 Остановлено','i');
        }
        function updateTrack(lat,lng) {
            if(!trackEnt) trackEnt=viewer.entities.add({
                position: Cesium.Cartesian3.fromDegrees(lng,lat),
                point: {pixelSize:16, color:Cesium.Color.fromCssColorString('#ff4757'), outlineColor:Cesium.Color.WHITE, outlineWidth:3},
                label: {text:'📍 Вы', font:'14px sans-serif', fillColor:Cesium.Color.WHITE, style:Cesium.LabelStyle.FILL_AND_OUTLINE, verticalOrigin:Cesium.VerticalOrigin.BOTTOM, pixelOffset:new Cesium.Cartesian2(0,-18), showBackground:true, backgroundColor:Cesium.Color.fromCssColorString('rgba(0,0,0,0.6)')},
                _type:'track'
            }); else trackEnt.position=Cesium.Cartesian3.fromDegrees(lng,lat);
            viewer.camera.setView({destination: Cesium.Cartesian3.fromDegrees(lng,lat,30000), orientation:{heading:0, pitch:Cesium.Math.toRadians(-50), roll:0}});
        }
        function trackUI(txt,cls,elId,disp) {
            const b=document.getElementById('btnTrack'), e=document.getElementById(elId);
            b.textContent=txt; b.className=cls?'panel-btn btn-track '+cls:'panel-btn btn-track';
            e.style.display=disp;
        }

        function toggleAdd() {
            if(!isAdmin) return; addMode=!addMode; delMode=false; document.getElementById('btnDel').className='panel-btn btn-del';
            document.getElementById('btnAdd').className=addMode?'panel-btn btn-add active':'panel-btn btn-add';
            document.getElementById('btnAdd').innerHTML=addMode?'📌 Кликните на карту':'📌 Добавить точку';
            addMode ? toast('📌 Кликните по карте','i') : null;
        }
        function closeModal() { document.getElementById('addModal').style.display='none'; pending=null; photo=null; document.getElementById('preview').style.display='none'; document.getElementById('fileIn').value=''; }
        function previewFile(e) {
            const f=e.target.files[0]; if(!f) return;
            if(f.size>5*1024*1024) return toast('❌ Макс 5МБ','e');
            const r=new FileReader(); r.onload=ev=>{ photo=ev.target.result; document.getElementById('preview').src=photo; document.getElementById('preview').style.display='block'; }; r.readAsDataURL(f);
        }
        function savePoint() {
            if(!pending) return;
            const d={id:'p_'+Date.now(), lat:pending.lat, lng:pending.lng, photo:photo||null, ts:Date.now()};
            localStorage.setItem('globePts', JSON.stringify([...getPts(), d]));
            addPt(d); closeModal(); toast('✅ Точка добавлена','s');
        }

        function toggleDel() {
            if(!isAdmin) return; delMode=!delMode; addMode=false; document.getElementById('btnAdd').className='panel-btn btn-add';
            document.getElementById('btnDel').className=delMode?'panel-btn btn-del active':'panel-btn btn-del';
            delMode ? toast('🗑 Кликните на точку','i') : null;
        }
        function delPoint(id) {
            localStorage.setItem('globePts', JSON.stringify(getPts().filter(p=>p.id!==id)));
            const i=savedEnts.findIndex(e=>e._id===id); if(i!==-1){viewer.entities.remove(savedEnts[i]); savedEnts.splice(i,1);}
            closePopup(); toast('🗑 Удалено','s');
        }

        function getPts() { try{return JSON.parse(localStorage.getItem('globePts')||'[]');}catch{return[];} }
        function loadPoints() { getPts().forEach(p=>addPt(p)); }
        function addPt(d) {
            const has=d.photo;
            const e=viewer.entities.add({
                position: Cesium.Cartesian3.fromDegrees(d.lng, d.lat),
                point: {pixelSize:has?18:12, color:has?Cesium.Color.fromCssColorString('#64c8ff'):Cesium.Color.fromCssColorString('#ffa502'), outlineColor:Cesium.Color.WHITE, outlineWidth:3},
                label: {text:has?'🖼 Фото':'📌', font:'14px sans-serif', fillColor:Cesium.Color.WHITE, style:Cesium.LabelStyle.FILL_AND_OUTLINE, verticalOrigin:Cesium.VerticalOrigin.BOTTOM, pixelOffset:new Cesium.Cartesian2(0,-16), showBackground:true, backgroundColor:Cesium.Color.fromCssColorString('rgba(0,0,0,0.6)')},
                _type:'pt', _id:d.id, _d
            });
            savedEnts.push(e);
        }

        function showPopup(ent) {
            const d=ent._data; document.getElementById('popImg').src=d.photo||''; document.getElementById('popImg').style.display=d.photo?'block':'none';
            document.getElementById('popTitle').textContent='📌 '+new Date(d.ts).toLocaleString('ru-RU');
            document.getElementById('popCoords').textContent=d.lat.toFixed(5)+', '+d.lng.toFixed(5);
            document.getElementById('photoPopup').style.display='block';
        }
        function closePopup() { document.getElementById('photoPopup').style.display='none'; }

        function toast(msg,type='i') {
            const t=document.createElement('div'); t.className='toast toast-'+type; t.textContent=msg;
            document.body.appendChild(t); setTimeout(()=>t.remove(),3000);
        }
        document.addEventListener('click', e=>{ const p=document.getElementById('photoPopup'); if(p.style.display==='block'&&!p.contains(e.target)) closePopup(); });
        document.addEventListener('keydown', e=>{ if(e.key==='Escape'){closePopup();closeModal();if(addMode)toggleAdd();if(delMode)toggleDel();} });
    </script>
</body>
</html>
