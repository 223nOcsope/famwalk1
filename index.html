<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌍 Мой 3D Глобус</title>

    <!-- CesiumJS - ИСПОЛЬЗУЕМ СТАБИЛЬНУЮ ВЕРСИЮ -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; background: #000; }
        #cesiumContainer { width: 100vw; height: 100vh; }

        .admin-toggle { position: fixed; top: 20px; right: 20px; z-index: 1000; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px 16px; border-radius: 12px; cursor: pointer; font-size: 14px; }
        .admin-panel { position: fixed; top: 70px; right: 20px; z-index: 999; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.15); border-radius: 16px; padding: 24px; color: white; width: 320px; display: none; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .admin-panel.active { display: block; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .admin-panel h3 { margin-bottom: 16px; font-size: 18px; color: #4fc3f7; }
        .admin-panel label { display: block; margin-bottom: 6px; font-size: 13px; color: #aaa; margin-top: 12px; }
        .admin-panel input[type="text"], .admin-panel input[type="password"], .admin-panel input[type="file"] { width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; font-size: 14px; outline: none; margin-bottom: 8px; }
        .admin-panel button { width: 100%; padding: 12px; margin-top: 8px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn-primary { background: linear-gradient(135deg, #4fc3f7, #2196f3); color: white; }
        .btn-danger { background: linear-gradient(135deg, #ef5350, #d32f2f); color: white; }
        .btn-success { background: linear-gradient(135deg, #66bb6a, #43a047); color: white; }
        .status-indicator { display: flex; align-items: center; gap: 8px; margin-top: 12px; padding: 10px; border-radius: 10px; background: rgba(255,255,255,0.05); font-size: 13px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; animation: pulse 2s infinite; }
        .status-dot.active { background: #4caf50; } .status-dot.inactive { background: #f44336; } .status-dot.waiting { background: #ff9800; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .image-card { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 998; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 16px; display: none; max-width: 400px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
        .image-card.active { display: block; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(30px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        .image-card img { width: 100%; max-height: 350px; object-fit: contain; border-radius: 12px; }
        .image-card .card-info { margin-top: 12px; color: white; text-align: center; }
        .image-card .close-btn { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.2); border: none; color: white; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; }
        .image-card .delete-point-btn { width: 100%; margin-top: 10px; padding: 8px; background: rgba(239,83,80,0.3); border: 1px solid rgba(239,83,80,0.5); color: #ef5350; border-radius: 8px; cursor: pointer; }

        .login-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 2000; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; }
        .login-overlay.hidden { display: none; }
        .login-box { background: rgba(30,30,30,0.95); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 40px; width: 360px; text-align: center; }
        .login-box h2 { color: white; margin-bottom: 8px; }
        .login-box p { color: #888; font-size: 13px; margin-bottom: 24px; }
        .login-box input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: white; font-size: 15px; outline: none; margin-bottom: 12px; text-align: center; }
        .login-box button { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }
        .login-box .error-msg { color: #ef5350; font-size: 13px; margin-top: 10px; display: none; }
        .login-box .skip-btn { background: transparent; color: #888; border: 1px solid rgba(255,255,255,0.1); }

        .info-bar { position: fixed; top: 20px; left: 20px; z-index: 997; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.15); border-radius: 14px; padding: 14px 20px; color: white; font-size: 13px; }
        .info-bar h4 { font-size: 15px; margin-bottom: 6px; color: #4fc3f7; }
        .info-bar .coords { font-family: 'Courier New', monospace; color: #aaa; font-size: 12px; }

        .add-mode-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 997; background: rgba(255,152,0,0.9); backdrop-filter: blur(10px); border-radius: 30px; padding: 12px 24px; color: white; font-size: 14px; font-weight: 600; display: none; align-items: center; gap: 10px; }
        .add-mode-bar.active { display: flex; animation: slideUp 0.3s ease; }

        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 3000; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 12px 24px; color: white; font-size: 14px; display: none; }
        .toast.show { display: block; animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

        .points-list { margin-top: 16px; max-height: 200px; overflow-y: auto; }
        .point-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 6px; font-size: 13px; cursor: pointer; }
        .point-item:hover { background: rgba(255,255,255,0.1); }
        .point-item .point-delete { background: none; border: none; color: #ef5350; cursor: pointer; font-size: 16px; }

        .photo-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 2500; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; }
        .photo-modal.active { display: flex; }
        .photo-modal-content { background: rgba(30,30,30,0.95); border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; padding: 30px; width: 380px; }
        .photo-modal-content h3 { color: white; margin-bottom: 16px; }
        .photo-modal-content label { display: block; color: #aaa; font-size: 13px; margin-bottom: 6px; margin-top: 12px; }
        .photo-modal-content input[type="text"] { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: white; font-size: 14px; outline: none; }
        .photo-modal-content input[type="file"] { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: white; font-size: 13px; }
        .photo-modal-content .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .photo-modal-content .btn-group button { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }

        .cesium-viewer-bottom { display: none !important; }
        .cesium-credit-logoContainer { display: none !important; }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    <div class="toast" id="toast"></div>

    <!-- МОДАЛКА ВХОДА -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>🔐 Вход для владельца</h2>
            <p>Введите пароль для управления глобусом</p>
            <input type="password" id="loginPassword" placeholder="Введите пароль">
            <button class="btn-primary" onclick="attemptLogin()">Войти</button>
            <button class="skip-btn" onclick="skipLogin()">👁 Смотреть как посетитель</button>
            <div class="error-msg" id="loginError">Неверный пароль!</div>
        </div>
    </div>

    <!-- ИНФОРМАЦИОННАЯ ПАНЕЛЬ -->
    <div class="info-bar" id="infoBar" style="display:none;">
        <h4>📍 Моя геолокация</h4>
        <div class="coords" id="coordsDisplay">Определение...</div>
        <div class="status-indicator">
            <div class="status-dot waiting" id="statusDot"></div>
            <span id="statusText">Подключение...</span>
        </div>
    </div>

    <!-- КНОПКА АДМИНКИ -->
    <button class="admin-toggle" id="adminToggle" style="display:none;" onclick="toggleAdmin()">⚙️ Управление</button>

    <!-- АДМИН ПАНЕЛЬ -->
    <div class="admin-panel" id="adminPanel">
        <h3>⚙️ Управление</h3>
        <div class="status-indicator">
            <div class="status-dot active"></div>
            <span>Режим владельца активен</span>
        </div>
        <label>📡 Трансляция геолокации</label>
        <button class="btn-success" onclick="startGeolocation()">▶ Начать трансляцию</button>
        <button class="btn-danger" onclick="stopGeolocation()">⏹ Остановить</button>
        <label>📌 Добавить точку с фото</label>
        <button class="btn-primary" onclick="enableAddMode()">➕ Поставить точку на карте</button>
        <label>🗑 Удалить все точки</label>
        <button class="btn-danger" onclick="clearAllPoints()">Очистить все</button>
        <label>🔑 Сменить пароль</label>
        <input type="password" id="newPassword" placeholder="Новый пароль">
        <button class="btn-primary" onclick="changePassword()">Сохранить пароль</button>
        <label>📋 Точки на карте</label>
        <div class="points-list" id="pointsList"></div>
    </div>

    <!-- КАРТОЧКА ИЗОБРАЖЕНИЯ -->
    <div class="image-card" id="imageCard">
        <button class="close-btn" onclick="closeImageCard()">✕</button>
        <img id="cardImage" src="" alt="">
        <div class="card-info">
            <h4 id="cardTitle"></h4>
            <p id="cardCoords"></p>
        </div>
        <button class="delete-point-btn" id="deletePointBtn" onclick="deleteCurrentPoint()">🗑 Удалить эту точку</button>
    </div>

    <!-- РЕЖИМ ДОБАВЛЕНИЯ -->
    <div class="add-mode-bar" id="addModeBar">
        <span>📌 Кликните на карту, чтобы поставить точку</span>
        <button onclick="disableAddMode()" style="background:rgba(0,0,0,0.3);border:none;color:white;padding:6px 14px;border-radius:20px;cursor:pointer;">✕ Отмена</button>
    </div>

    <!-- МОДАЛКА ДОБАВЛЕНИЯ ФОТО -->
    <div class="photo-modal" id="photoModal">
        <div class="photo-modal-content">
            <h3>📸 Добавить фото к точке</h3>
            <label>Название точки</label>
            <input type="text" id="pointName" placeholder="Например: Мое любимое место">
            <label>Изображение</label>
            <input type="file" id="pointImage" accept="image/*" capture="environment">
            <div class="btn-group">
                <button class="btn-danger" onclick="cancelPoint()">Отмена</button>
                <button class="btn-success" onclick="savePoint()">💾 Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_PASSWORD = 'admin123';
        const STORAGE_KEY = 'globe3d_data';
        let isAdmin = false;
        let isAddMode = false;
        let viewer = null;
        let geoEntity = null;
        let geoWatchId = null;
        let pointEntities = {};
        let currentPointId = null;
        let pendingPointCoords = null;

        // ИНИЦИАЛИЗАЦИЯ CESIUM - ИСПРАВЛЕНО
        function initCesium() {
            viewer = new Cesium.Viewer('cesiumContainer', {
                baseLayerPicker: true,
                geocoder: false,
                homeButton: true,
                sceneModePicker: true,
                selectionIndicator: false,
                timeline: false,
                animation: false,
                navigationHelpButton: true,
                fullscreenButton: true,
                infoBox: false,
                shouldAnimate: true
            });

            // Обработка кликов
            const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
            handler.setInputAction(function(click) {
                if (isAddMode) {
                    const cartesian = viewer.camera.pickEllipsoid(click.position, viewer.scene.globe.ellipsoid);
                    if (cartesian) {
                        const cartographic = Cesium.Cartographic.fromCartesian(cartesian);
                        const lat = Cesium.Math.toDegrees(cartographic.latitude);
                        const lng = Cesium.Math.toDegrees(cartographic.longitude);
                        pendingPointCoords = { lat, lng };
                        openPhotoModal();
                    }
                } else {
                    const pickedObject = viewer.scene.pick(click.position);
                    if (Cesium.defined(pickedObject) && pickedObject.id && pickedObject.id._pointData) {
                        showImageCard(pickedObject.id._pointData);
                    } else {
                        closeImageCard();
                    }
                }
            }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

            showToast('🌍 Глобус загружен!');
        }

        function attemptLogin() {
            const pwd = document.getElementById('loginPassword').value;
            const savedPwd = localStorage.getItem('globe3d_password') || DEFAULT_PASSWORD;
            if (pwd === savedPwd) {
                isAdmin = true;
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('infoBar').style.display = 'block';
                document.getElementById('adminToggle').style.display = 'block';
                showToast('✅ Вы вошли как владелец!');
                loadPoints();
            } else {
                document.getElementById('loginError').style.display = 'block';
                setTimeout(() => document.getElementById('loginError').style.display = 'none', 2000);
            }
        }

        function skipLogin() {
            isAdmin = false;
            document.getElementById('loginOverlay').classList.add('hidden');
            showToast('👁 Режим просмотра');
            loadPoints();
        }

        document.getElementById('loginPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') attemptLogin();
        });

        function startGeolocation() {
            if (!navigator.geolocation) { showToast('❌ Геолокация не поддерживается'); return; }
            showToast('📡 Поиск местоположения...');
            geoWatchId = navigator.geolocation.watchPosition(
                function(position) {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const accuracy = position.coords.accuracy;
                    updateGeoMarker(lat, lng, accuracy);
                    updateStatus('active', `Точность: ${Math.round(accuracy)}м`);
                    updateCoordsDisplay(lat, lng);
                },
                function(error) {
                    let msg = 'Ошибка геолокации';
                    switch(error.code) {
                        case 1: msg = 'Доступ запрещён'; break;
                        case 2: msg = 'Не удалось определить'; break;
                        case 3: msg = 'Время истекло'; break;
                    }
                    showToast('❌ ' + msg);
                    updateStatus('inactive', msg);
                },
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 5000 }
            );
        }

        function stopGeolocation() {
            if (geoWatchId !== null) { navigator.geolocation.clearWatch(geoWatchId); geoWatchId = null; }
            if (geoEntity) { viewer.entities.remove(geoEntity); geoEntity = null; }
            updateStatus('inactive', 'Трансляция остановлена');
            showToast('⏹ Трансляция остановлена');
        }

        function updateGeoMarker(lat, lng, accuracy) {
            if (geoEntity) {
                geoEntity.position = Cesium.Cartesian3.fromDegrees(lng, lat);
            } else {
                geoEntity = viewer.entities.add({
                    position: Cesium.Cartesian3.fromDegrees(lng, lat),
                    point: { pixelSize: 16, color: Cesium.Color.fromCssColorString('#4fc3f7'), outlineColor: Cesium.Color.WHITE, outlineWidth: 2 },
                    label: { text: '📍 Вы здесь', font: '14px sans-serif', fillColor: Cesium.Color.WHITE, outlineColor: Cesium.Color.BLACK, outlineWidth: 2, style: Cesium.LabelStyle.FILL_AND_OUTLINE, verticalOrigin: Cesium.VerticalOrigin.BOTTOM, pixelOffset: new Cesium.Cartesian2(0, -20) }
                });
            }
            viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(lng, lat, 5000), duration: 1.5 });
        }

        function updateStatus(state, text) {
            document.getElementById('statusDot').className = 'status-dot ' + state;
            document.getElementById('statusText').textContent = text;
        }

        function updateCoordsDisplay(lat, lng) {
            document.getElementById('coordsDisplay').textContent = `${lat.toFixed(6)}°, ${lng.toFixed(6)}°`;
        }

        function enableAddMode() { isAddMode = true; document.getElementById('addModeBar').classList.add('active'); showToast('📌 Кликните на карту'); }
        function disableAddMode() { isAddMode = false; document.getElementById('addModeBar').classList.remove('active'); }
        function openPhotoModal() { disableAddMode(); document.getElementById('photoModal').classList.add('active'); document.getElementById('pointName').value = ''; document.getElementById('pointImage').value = ''; }
        function cancelPoint() { document.getElementById('photoModal').classList.remove('active'); pendingPointCoords = null; }

        function savePoint() {
            const name = document.getElementById('pointName').value || 'Без названия';
            const fileInput = document.getElementById('pointImage');
            if (!fileInput.files.length) { showToast('❌ Выберите изображение'); return; }
            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                const imageData = e.target.result;
                const pointId = 'point_' + Date.now();
                const pointData = { id: pointId, name: name, lat: pendingPointCoords.lat, lng: pendingPointCoords.lng, image: imageData, timestamp: Date.now() };
                savePointData(pointData);
                addPointToMap(pointData);
                updatePointsList();
                document.getElementById('photoModal').classList.remove('active');
                pendingPointCoords = null;
                showToast('✅ Точка добавлена!');
            };
            reader.readAsDataURL(file);
        }

        function addPointToMap(pointData) {
            const entity = viewer.entities.add({
                position: Cesium.Cartesian3.fromDegrees(pointData.lng, pointData.lat),
                point: { pixelSize: 20, color: Cesium.Color.fromCssColorString('#ff9800'), outlineColor: Cesium.Color.WHITE, outlineWidth: 3 },
                label: { text: pointData.name, font: '13px sans-serif', fillColor: Cesium.Color.WHITE, outlineColor: Cesium.Color.BLACK, outlineWidth: 2, style: Cesium.LabelStyle.FILL_AND_OUTLINE, verticalOrigin: Cesium.VerticalOrigin.BOTTOM, pixelOffset: new Cesium.Cartesian2(0, -24) },
                _pointData: pointData
            });
            pointEntities[pointData.id] = entity;
        }

        function savePointData(pointData) {
            const data = getStoredData();
            data.points.push(pointData);
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
            catch(e) { if (data.points.length > 3) { data.points.splice(0, data.points.length - 3); localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } }
        }

        function loadPoints() { const data = getStoredData(); data.points.forEach(p => addPointToMap(p)); updatePointsList(); }
        function getStoredData() { const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : { points: [], password: DEFAULT_PASSWORD }; }

        function updatePointsList() {
            const data = getStoredData();
            const list = document.getElementById('pointsList');
            list.innerHTML = '';
            if (data.points.length === 0) { list.innerHTML = '<div style="color:#666;font-size:12px;padding:8px;">Нет точек</div>'; return; }
            data.points.forEach(p => {
                const item = document.createElement('div');
                item.className = 'point-item';
                item.innerHTML = `<span style="color:white;">📌 ${p.name}</span><button class="point-delete" onclick="event.stopPropagation(); deletePoint('${p.id}')">✕</button>`;
                item.onclick = () => { viewer.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(p.lng, p.lat, 2000), duration: 1.5 }); showImageCard(p); };
                list.appendChild(item);
            });
        }

        function deletePoint(id) {
            const data = getStoredData();
            data.points = data.points.filter(p => p.id !== id);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            if (pointEntities[id]) { viewer.entities.remove(pointEntities[id]); delete pointEntities[id]; }
            closeImageCard();
            updatePointsList();
            showToast('🗑 Точка удалена');
        }

        function deleteCurrentPoint() { if (currentPointId) deletePoint(currentPointId); }
        function clearAllPoints() { if (!confirm('Удалить все точки?')) return; const data = getStoredData(); data.points = []; localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); Object.values(pointEntities).forEach(e => viewer.entities.remove(e)); pointEntities = {}; closeImageCard(); updatePointsList(); showToast('🗑 Все точки удалены'); }

        function showImageCard(pointData) {
            currentPointId = pointData.id;
            document.getElementById('cardImage').src = pointData.image;
            document.getElementById('cardTitle').textContent = pointData.name;
            document.getElementById('cardCoords').textContent = `${pointData.lat.toFixed(6)}°, ${pointData.lng.toFixed(6)}°`;
            document.getElementById('deletePointBtn').style.display = isAdmin ? 'block' : 'none';
            document.getElementById('imageCard').classList.add('active');
        }

        function closeImageCard() { document.getElementById('imageCard').classList.remove('active'); currentPointId = null; }
        function toggleAdmin() { document.getElementById('adminPanel').classList.toggle('active'); }

        function changePassword() {
            const newPwd = document.getElementById('newPassword').value;
            if (newPwd.length < 4) { showToast('❌ Пароль минимум 4 символа'); return; }
            localStorage.setItem('globe3d_password', newPwd);
            document.getElementById('newPassword').value = '';
            showToast('✅ Пароль изменён!');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show';
            setTimeout(() => toast.className = 'toast', 3000);
        }

        window.addEventListener('load', initCesium);
    </script>
</body>
</html>
